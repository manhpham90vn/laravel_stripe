name: payment-e2e

volumes:
  shared: {}

services:
  app:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    env_file: .env.e2e
    volumes:
      - shared:/shared
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/courses"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 40s
    depends_on:
      - stripe-cli

  stripe-cli:
    image: stripe/stripe-cli:latest
    env_file: .env.e2e
    volumes:
      - shared:/shared
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        echo "[stripe-cli] fetching webhook signing secret ..."
        stripe listen --api-key "$$STRIPE_SECRET" --print-secret > /shared/webhook_secret
        echo "[stripe-cli] secret: $$(cat /shared/webhook_secret)"
        echo "[stripe-cli] forwarding to http://app:8000/webhooks/stripe"
        exec stripe listen --api-key "$$STRIPE_SECRET" \
            --forward-to http://app:8000/webhooks/stripe

  playwright:
    image: mcr.microsoft.com/playwright:v1.60.0-jammy
    working_dir: /e2e
    env_file: .env.e2e
    environment:
      BASE_URL: http://app:8000
    volumes:
      - ./e2e:/e2e
    depends_on:
      app:
        condition: service_healthy
    command: ["sh", "-c", "npm ci && npx playwright test"]

  cloudflared:
    image: cloudflare/cloudflared:latest
    network_mode: "service:app"
    command: tunnel --no-autoupdate --url http://localhost:8000
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
